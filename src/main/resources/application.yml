server:
  port: ${FANQIE_SERVER_PORT:8080}

spring:
  application:
    name: fanqie-pomodoro
  datasource:
    url: ${FANQIE_DB_URL:jdbc:mysql://localhost:3306/fanqie?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${FANQIE_DB_USERNAME:root}
    password: ${FANQIE_DB_PASSWORD:}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai

fanqie:
  agent:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    timeout-seconds: ${FANQIE_AGENT_TIMEOUT_SECONDS:45}
    mock-response: ${FANQIE_AGENT_MOCK_RESPONSE:}
